<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaintingStore - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 50px 40px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-title {
            text-align: center;
            font-size: 32px;
            font-weight: 300;
            color: #333;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s ease;
            background-color: #f9f9f9;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: #666;
        }

        .login-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
            margin: 0 4px;
        }

        .login-footer a:hover {
            color: #764ba2;
        }

        .error-message {
            background-color: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            animation: shake 0.3s ease-in-out;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background-color: #efe;
            border: 1px solid #cfc;
            color: #3c3;
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        .success-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            background: white;
            padding: 0 10px;
            color: #999;
            font-size: 12px;
            position: relative;
            font-weight: 600;
        }

        .otp-inputs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 20px 0;
        }

        .otp-input {
            width: 45px;
            height: 50px;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .otp-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .timer {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-top: 15px;
        }

        .timer.warning {
            color: #ff6b6b;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 40px 20px;
            }

            .login-title {
                font-size: 28px;
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <!-- LOGIN TAB -->
        <div id="login" class="tab-content active">
            <h1 class="login-title">Log-in</h1>
            
            <div id="loginError" class="error-message"></div>
            <div id="loginSuccess" class="success-message"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginUsername">Username or Email</label>
                    <input 
                        type="text" 
                        id="loginUsername" 
                        placeholder="Username" 
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input 
                        type="password" 
                        id="loginPassword" 
                        placeholder="Password" 
                        required
                    />
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    Login
                </button>
            </form>

            <div class="login-footer">
                <a href="#" onclick="switchTab('register'); return false;">Register</a> • 
                <a href="#" onclick="alert('Password reset not yet implemented'); return false;">Forgot Password</a>
            </div>
        </div>

        <!-- REGISTER TAB -->
        <div id="register" class="tab-content">
            <h1 class="login-title">Register</h1>
            
            <div id="registerError" class="error-message"></div>
            <div id="registerSuccess" class="success-message"></div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="registerUsername">Username</label>
                    <input 
                        type="text" 
                        id="registerUsername" 
                        placeholder="Username" 
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input 
                        type="email" 
                        id="registerEmail" 
                        placeholder="Email" 
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input 
                        type="password" 
                        id="registerPassword" 
                        placeholder="Password" 
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="registerConfirm">Confirm Password</label>
                    <input 
                        type="password" 
                        id="registerConfirm" 
                        placeholder="Confirm Password" 
                        required
                    />
                </div>

                <button type="submit" class="login-btn" id="registerBtn">
                    Register
                </button>
            </form>

            <div class="login-footer">
                Already have an account? 
                <a href="#" onclick="switchTab('login'); return false;">Login</a>
            </div>
        </div>

        <!-- OTP CONFIRMATION TAB -->
        <div id="otp" class="tab-content">
            <h1 class="login-title">Verify OTP</h1>
            
            <div id="otpError" class="error-message"></div>
            <div id="otpSuccess" class="success-message"></div>

            <form id="otpForm" onsubmit="handleConfirm(event)">
                <p style="text-align: center; color: #666; margin-bottom: 20px; font-size: 14px;">
                    Enter the 6-digit code sent to your email
                </p>

                <div class="otp-inputs">
                    <input class="otp-input" type="text" maxlength="1" pattern="[0-9]" />
                    <input class="otp-input" type="text" maxlength="1" pattern="[0-9]" />
                    <input class="otp-input" type="text" maxlength="1" pattern="[0-9]" />
                    <input class="otp-input" type="text" maxlength="1" pattern="[0-9]" />
                    <input class="otp-input" type="text" maxlength="1" pattern="[0-9]" />
                    <input class="otp-input" type="text" maxlength="1" pattern="[0-9]" />
                </div>

                <button type="submit" class="login-btn" id="otpBtn">
                    Verify
                </button>

                <div class="timer">
                    Time remaining: <span id="timer">5:00</span>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/auth';
        let registerEmail = '';
        let otpTimerInterval = null;

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');

            if (tab === 'otp') {
                startOtpTimer();
                focusFirstOtpInput();
            } else if (otpTimerInterval) {
                clearInterval(otpTimerInterval);
            }
        }

        function showError(tabId, message) {
            const errorEl = document.getElementById(`${tabId}Error`);
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => errorEl.classList.remove('show'), 5000);
        }

        function showSuccess(tabId, message) {
            const successEl = document.getElementById(`${tabId}Success`);
            successEl.textContent = message;
            successEl.classList.add('show');
        }

        function setButtonLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = `<span class="loading"></span>Loading...`;
            } else {
                btn.disabled = false;
                btn.textContent = btn.dataset.originalText || btn.textContent;
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            btn.dataset.originalText = btn.textContent;

            setButtonLoading('loginBtn', true);

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usernameOrEmail: username, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem('authToken', data.token);
                    showSuccess('login', 'Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showError('login', 'Invalid username or password');
                }
            } catch (error) {
                showError('login', 'Connection error. Please try again.');
            } finally {
                setButtonLoading('loginBtn', false);
            }
        }

        async function handleRegister(event) {
            event.preventDefault();

            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;

            if (password !== confirm) {
                showError('register', 'Passwords do not match');
                return;
            }

            if (password.length < 8) {
                showError('register', 'Password must be at least 8 characters');
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.dataset.originalText = btn.textContent;
            setButtonLoading('registerBtn', true);

            try {
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    registerEmail = email;
                    localStorage.setItem('registerEmail', email);
                    showSuccess('register', 'Registration successful! Check your email for OTP.');
                    document.getElementById('registerForm').reset();
                    
                    setTimeout(() => {
                        switchTab('otp');
                    }, 1500);
                } else {
                    showError('register', data.message || 'Registration failed');
                }
            } catch (error) {
                showError('register', 'Connection error. Please try again.');
            } finally {
                setButtonLoading('registerBtn', false);
            }
        }

        async function handleConfirm(event) {
            event.preventDefault();

            const otpInputs = document.querySelectorAll('.otp-input');
            const otp = Array.from(otpInputs).map(input => input.value).join('');
            const email = registerEmail || localStorage.getItem('registerEmail');

            if (otp.length !== 6) {
                showError('otp', 'Please enter all 6 digits');
                return;
            }

            const btn = document.getElementById('otpBtn');
            btn.dataset.originalText = btn.textContent;
            setButtonLoading('otpBtn', true);

            try {
                const response = await fetch(`${API_BASE}/confirm`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('otp', 'Email verified! You can now login.');
                    clearInterval(otpTimerInterval);
                    
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('otpForm').reset();
                    }, 1500);
                } else {
                    showError('otp', data.message || 'Invalid OTP');
                }
            } catch (error) {
                showError('otp', 'Connection error. Please try again.');
            } finally {
                setButtonLoading('otpBtn', false);
            }
        }

        function focusFirstOtpInput() {
            const inputs = document.querySelectorAll('.otp-input');
            if (inputs.length > 0) {
                inputs[0].focus();
            }
        }

        // OTP Input handling
        document.addEventListener('input', (event) => {
            if (event.target.classList.contains('otp-input')) {
                if (event.target.value && event.target.nextElementSibling) {
                    event.target.nextElementSibling.focus();
                }
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.target.classList.contains('otp-input')) {
                if (event.key === 'Backspace' && !event.target.value && event.target.previousElementSibling) {
                    event.target.previousElementSibling.focus();
                }
            }
        });

        function startOtpTimer() {
            let seconds = 300; // 5 minutes
            
            if (otpTimerInterval) {
                clearInterval(otpTimerInterval);
            }

            otpTimerInterval = setInterval(() => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                const timerEl = document.getElementById('timer');
                
                timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                
                if (seconds < 60) {
                    timerEl.parentElement.classList.add('warning');
                }

                if (seconds === 0) {
                    clearInterval(otpTimerInterval);
                    showError('otp', 'OTP expired. Please register again.');
                    setTimeout(() => switchTab('register'), 2000);
                }

                seconds--;
            }, 1000);
        }

        // Focus first input on OTP tab
        const observer = new MutationObserver(() => {
            if (document.getElementById('otp').classList.contains('active')) {
                focusFirstOtpInput();
            }
        });

        observer.observe(document.getElementById('otp'), { attributes: true });

        // Initialize
        document.getElementById('loginBtn').dataset.originalText = 'Login';
        document.getElementById('registerBtn').dataset.originalText = 'Register';
        document.getElementById('otpBtn').dataset.originalText = 'Verify';
    </script>
</body>
</html>
