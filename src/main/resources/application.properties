# Server
server.port=8080

# Exclude /api/** from static resource mapping (so @RestController endpoints work)
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.static-path-pattern=/static/**

# Datasource (example H2)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# Redis (defaults)
spring.redis.host=localhost
spring.redis.port=6379

# Mail - Gmail SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=nguyenthanh3557@gmail.com
spring.mail.password=Thanhbk64@
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT
app.jwt.secret=ReplaceWithASecretKeyOfSufficientLengthChangeMe!
app.jwt.expiration-ms=3600000

# OTP settings
app.otp.max-per-hour=5

# Flyway
spring.flyway.enabled=true
spring.application.name=ManageStore
# --- Sample datasource & Flyway (edit before use) ---
spring.datasource.url=jdbc:mysql://localhost:3306/painting_store?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=150601
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Logging Configuration
# Bật DEBUG cho Auth components (security, service)
logging.level.root=INFO
logging.level.com.vn.ManageStore=DEBUG
logging.level.com.vn.ManageStore.security=DEBUG
logging.level.com.vn.ManageStore.service=DEBUG
logging.level.org.springframework.security=DEBUG

# Log ra file
logging.file.name=logs/managestore.log
logging.file.max-size=10MB
logging.file.max-history=10

# Log pattern
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

