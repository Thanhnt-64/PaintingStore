# application-prod.properties
# Production configuration file

# Server - listen only on localhost (Nginx proxies from outside)
server.port=8080
server.address=127.0.0.1

# Datasource - MySQL production
spring.datasource.url=jdbc:mysql://mysql-host:3306/managestore?useSSL=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=managestore_user
spring.datasource.password=ChangeMe!Production123
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# JPA/Hibernate - validate only, no auto schema updates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Redis - production cluster
spring.redis.host=redis-host
spring.redis.port=6379
spring.redis.password=ChangeMe!Redis123
spring.redis.timeout=2000
spring.redis.lettuce.pool.max-active=20
spring.redis.lettuce.pool.max-idle=10
spring.redis.lettuce.pool.min-idle=5

# Mail - production SMTP (e.g., Gmail, SendGrid, AWS SES)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@yourdomain.com
spring.mail.password=app-specific-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT - use a strong random secret (base64 encoded, min 32 bytes)
app.jwt.secret=VeryLongSecureRandomBase64EncodedKeyFor32BytesOrMoreChangeMe!
app.jwt.expiration-ms=3600000

# OTP settings
app.otp.max-per-hour=5

# Flyway - run migrations on startup
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Logging - production level (WARN to reduce logs)
logging.level.root=WARN
logging.level.com.vn.ManageStore=INFO
logging.level.org.springframework.security=INFO
logging.file.name=/var/log/managestore/application.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Jackson - JSON serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.locale=en_US

# Actuator - health check for monitoring
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Security - disable default security for Nginx to handle HTTPS
server.ssl.enabled=false

# Connection pool tuning
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=10000
server.tomcat.accept-count=100

# Compression
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
