# nginx-managestore.conf
# Nginx reverse proxy configuration for ManageStore
# Copy to: /etc/nginx/sites-available/managestore
# Enable with: sudo ln -s /etc/nginx/sites-available/managestore /etc/nginx/sites-enabled/
# Test: sudo nginx -t
# Reload: sudo systemctl reload nginx

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    
    # Let's Encrypt verification (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server with SSL/TLS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # =================== SSL Configuration ===================
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    # SSL protocols (TLSv1.2 and above)
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # Strong ciphers only
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    
    # Session cache and timeout
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (certificate validation)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4;
    resolver_timeout 10s;

    # =================== Security Headers ===================
    # Strict-Transport-Security (HSTS): Force HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Clickjacking protection
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # XSS protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer policy
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Content Security Policy (adjust as needed)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
    
    # =================== Logging ===================
    access_log /var/log/nginx/managestore-access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/managestore-error.log warn;

    # =================== Gzip Compression ===================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/x-javascript
        application/xml+rss
        application/json
        application/javascript;
    gzip_comp_level 6;
    gzip_disable "msie6";

    # =================== Timeouts & Buffers ===================
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;
    
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 24 4k;

    # =================== Rate Limiting ===================
    # Optional: limit requests to prevent DDoS
    # Uncomment to enable (requires: limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s; in http block)
    # limit_req zone=api burst=20 nodelay;

    # =================== Reverse Proxy to Spring Boot ===================
    location / {
        # Spring Boot backend server (internal, HTTP only)
        proxy_pass http://127.0.0.1:8080;
        
        # Preserve original request information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Connection settings
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Disable buffering for real-time updates (WebSocket, SSE)
        # proxy_buffering off;
    }

    # =================== Health Check Endpoint ===================
    location /health {
        access_log off;  # Don't log health checks
        proxy_pass http://127.0.0.1:8080/actuator/health;
    }

    # =================== Metrics (Prometheus) ===================
    # Optional: expose metrics (restrict access if needed)
    location /metrics {
        proxy_pass http://127.0.0.1:8080/actuator/metrics;
        # Restrict to internal network only
        # allow 10.0.0.0/8;
        # deny all;
    }

    # =================== Static Files (if any) ===================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # =================== Deny Access to Sensitive Paths ===================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ /WEB-INF {
        deny all;
    }
}

# Optional: Upstream configuration for load balancing (multiple instances)
# upstream managestore_backend {
#     server 127.0.0.1:8080 weight=1;
#     server 127.0.0.1:8081 weight=1;
#     server 127.0.0.1:8082 weight=1;
#     keepalive 32;
# }
# 
# Then change: proxy_pass http://managestore_backend;
